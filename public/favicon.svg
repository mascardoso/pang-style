<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Glowing background effect -->
  <circle cx="16" cy="14" r="11" fill="#FF1493" opacity="0.25" />
  
  <!-- Outer retro border of the bubble -->
  <circle cx="16" cy="14" r="10" stroke="#000000" stroke-width="2" fill="#FF1493" />
  
  <!-- Inner gloss highlight -->
  <circle cx="13" cy="11" r="3" fill="#FFFFFF" opacity="0.6" />
  
  <!-- Sharp harpoon head popping from the bottom -->
  <path d="M16,16 L12,28 L16,25 L20,28 Z" fill="#00FFFF" stroke="#000000" stroke-width="1.5" stroke-linejoin="round" />
  <!-- Harpoon tip highlight -->
  <path d="M16,17 L14,24 L16,22.5 Z" fill="#FFFFFF" opacity="0.5" />
</svg>